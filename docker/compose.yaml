# ============================================================================
# stonefish-ws 팀 개발 compose — GPU + X11 GUI 개발 컨테이너
#
# 정본(canonical): .omp/env/compose.yaml (omp-env 관리)
# 배포 사본:       stonefish_sim/docker/compose.yaml, stonefish_slam/docker/compose.yaml
#
# 전제 워크스페이스 레이아웃(레포는 항상 <ws>/src/<repo>에 클론):
#   stonefish_ws/
#   ├── src/stonefish_sim/      ← 이 compose의 사본은 <repo>/docker/에 있음
#   └── src/stonefish_slam/
#
# 사용(레포의 docker/ 디렉토리에서):
#   xhost +SI:localuser:$(id -un)     # 호스트에서 1회 — X11 접근 허용
#   HOST_UID=$(id -u) HOST_GID=$(id -g) docker compose up -d --build
#   docker compose exec stonefish-dev bash
# (⚠️ bash에서 UID는 readonly 특수변수라 UID=... 인라인 전달이 조용히 실패한다 —
#  그래서 변수명이 HOST_UID/HOST_GID다. .env 파일로 대신 지정해도 된다.)
#
# GPU 전제: 호스트에 NVIDIA 드라이버 + nvidia-container-toolkit 설치.
#   컨테이너 안에서 `glxinfo | grep renderer` 출력에 llvmpipe가 보이면
#   소프트웨어 렌더링 폴백 상태 — GPU 배선 실패이니 설치 가이드 참조.
# ============================================================================
services:
  stonefish-dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${HOST_UID:-1000}
        GID: ${HOST_GID:-1000}
        STONEFISH_REF: ${STONEFISH_REF:-main}
    image: ${DOCKER_NAMESPACE:-hero-lab-postech}/stonefish-dev:${IMAGE_TAG:-humble-1.3.0}
    container_name: stonefish-dev
    # DDS(FastDDS) 발견·공유메모리: 호스트와 네트워크+IPC 네임스페이스 공유
    network_mode: host
    ipc: host
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - QT_X11_NO_MITSHM=1
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      # graphics 필수(OpenGL 렌더링) — compute는 CUDA 워크로드 대비
      - NVIDIA_DRIVER_CAPABILITIES=graphics,utility,compute
    volumes:
      # 워크스페이스 루트 bind-mount (<repo>/docker/ 기준 ../../.. = <ws>)
      # .omp/env/ 정본에서 직접 띄울 때는 WS_DIR=../.. 로 재정의
      - ${WS_DIR:-../../..}:/workspace
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # compose는 ~를 확장하지 않으므로 $HOME 기반 기본값 사용
      - ${XAUTHORITY:-${HOME}/.Xauthority}:/home/dev/.Xauthority:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    stdin_open: true
    tty: true
    command: ["bash"]
